name: Build luci-app-nfs-server (.apk + feed)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gettext git libncurses5-dev libssl-dev python3 python3-distutils \
            rsync unzip zlib1g-dev file wget

      - name: Download OpenWrt 25.12 SDK (x86_64)
        run: |
          wget https://downloads.openwrt.org/releases/25.12.0/targets/x86/64/openwrt-sdk-25.12.0-x86-64_gcc-13.2.0_musl.Linux-x86_64.tar.xz
          tar xf openwrt-sdk-25.12.0-x86-64_gcc-13.2.0_musl.Linux-x86_64.tar.xz
          mv openwrt-sdk-* openwrt-sdk

      - name: Add luci-app-nfs-server to SDK
        run: |
          mkdir -p openwrt-sdk/package/luci-app-nfs-server
          cp -r ./* openwrt-sdk/package/luci-app-nfs-server/

      - name: Configure SDK
        working-directory: openwrt-sdk
        run: |
          echo "CONFIG_PACKAGE_luci-app-nfs-server=y" >> .config
          make defconfig

      - name: Build luci-app-nfs-server (.apk)
        working-directory: openwrt-sdk
        run: |
          make package/luci-app-nfs-server/compile V=s

      - name: Prepare feed directory
        run: |
          mkdir -p feed
          cp openwrt-sdk/bin/packages/*/*/luci-app-nfs-server*.apk feed/

      - name: Generate APKINDEX
        working-directory: feed
        run: |
          apk index -o APKINDEX.tar.gz *.apk

      - name: Upload feed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-nfs-server-feed
          path: feed/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "Release ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            feed/*.apk
            feed/APKINDEX.tar.gz

