name: Build luci-app-nfs-server (.apk + feed + release)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    strategy:
      fail-fast: false
      matrix:
        target:
          - arch: x86_64
            sdk_url: https://downloads.openwrt.org/releases/25.12.0/targets/x86/64/openwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst

          - arch: arm64
            sdk_url: https://downloads.openwrt.org/releases/25.12.0/targets/armsr/armv8/openwrt-sdk-25.12.0-armsr-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst

          - arch: ramips-mt7621
            sdk_url: https://downloads.openwrt.org/releases/25.12.0/targets/ramips/mt7621/openwrt-sdk-25.12.0-ramips-mt7621_gcc-14.3.0_musl.Linux-x86_64.tar.zst

          - arch: kirkwood
            sdk_url: https://downloads.openwrt.org/releases/25.12.0/targets/kirkwood/generic/openwrt-sdk-25.12.0-kirkwood-generic_gcc-14.3.0_musl.Linux-x86_64.tar.zst

          - arch: octeon
            sdk_url: https://downloads.openwrt.org/releases/25.12.0/targets/octeon/generic/openwrt-sdk-25.12.0-octeon-generic_gcc-14.3.0_musl.Linux-x86_64.tar.zst

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gettext git libncurses5-dev libssl-dev python3 \
            rsync unzip zlib1g-dev file wget zstd apk-tools

      - name: Download SDK for ${{ matrix.target.arch }}
        run: |
          wget ${{ matrix.target.sdk_url }} -O sdk.tar.zst
          tar --use-compress-program=unzstd -xf sdk.tar.zst
          mv openwrt-sdk-* openwrt-sdk

      - name: Add luci-app-nfs-server to SDK
        run: |
          mkdir -p openwrt-sdk/package/luci-app-nfs-server
          cp -r ./* openwrt-sdk/package/luci-app-nfs-server/

      - name: Configure SDK
        working-directory: openwrt-sdk
        run: |
          echo "CONFIG_PACKAGE_luci-app-nfs-server=y" >> .config
          make defconfig

      - name: Build luci-app-nfs-server (.apk)
        working-directory: openwrt-sdk
        run: |
          make package/luci-app-nfs-server/compile V=s

      - name: Prepare feed directory
        run: |
          mkdir -p feed/${{ matrix.target.arch }}
          cp openwrt-sdk/bin/packages/*/*/luci-app-nfs-server*.apk feed/${{ matrix.target.arch }}/

      - name: Generate APKINDEX
        working-directory: feed/${{ matrix.target.arch }}
        run: |
          apk index -o APKINDEX.tar.gz *.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "Release ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            feed/${{ matrix.target.arch }}/*.apk
            feed/${{ matrix.target.arch }}/APKINDEX.tar.gz

